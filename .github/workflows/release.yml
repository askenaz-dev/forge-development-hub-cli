name: release

# Triggered by a semver tag push (v0.5.2, v1.0.0-rc.1, etc.). The pipeline
# runs goreleaser (which publishes binaries to GitHub Releases) and then
# publishes the @askenaz-dev/fdh npm wrapper at the same version.
#
# workflow_dispatch lets ops re-run a release (or snapshot a build) without
# pushing a tag.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Override version string (e.g. v0.1.0-rc.1)"
        required: false

permissions:
  contents: write

jobs:
  goreleaser:
    name: build + publish to GitHub Releases (goreleaser)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # goreleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v0.0.0-$(date -u +%Y%m%d)-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          # `release --clean` publishes to GitHub Releases. For dispatch runs
          # we pass `--snapshot --skip=publish` to build artifacts without
          # touching the release.
          args: >-
            ${{ startsWith(github.ref, 'refs/tags/') && 'release --clean'
                || 'release --clean --snapshot --skip=publish' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dist artifacts (for npm job)
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.ver.outputs.version }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/*.deb
            dist/*.rpm

  publish-npm:
    name: publish @askenaz-dev/fdh
    needs: goreleaser
    runs-on: ubuntu-latest
    # Only on real tag pushes (skip workflow_dispatch / snapshot builds).
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      # Required for npm provenance — links the published package to this
      # workflow run on GitHub.
      id-token: write
    defaults:
      run:
        working-directory: ./npm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Default registry. Override with NPM_INTERNAL_REGISTRY (vars) to
          # publish to a private registry instead of npmjs.org.
          registry-url: ${{ vars.NPM_INTERNAL_REGISTRY || 'https://registry.npmjs.org/' }}

      - name: Install dev deps (no postinstall)
        run: npm install --ignore-scripts

      - name: Build (tsc + shebang fixup)
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Set npm package version to match Go binary
        env:
          VERSION: ${{ needs.goreleaser.outputs.version }}
        run: |
          # Strip leading v: v0.7.2 -> 0.7.2 (npm semver doesn't accept the v)
          npm_ver="${VERSION#v}"
          # --no-git-tag-version: don't commit; --allow-same-version: idempotent on re-runs.
          npm version "$npm_ver" --no-git-tag-version --allow-same-version
          echo "set @askenaz-dev/fdh version to $npm_ver"

      - name: Publish to npm
        env:
          # Default token (public npmjs.org) → NPM_TOKEN.
          # Private registry override → NPM_INTERNAL_TOKEN.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_INTERNAL_TOKEN || secrets.NPM_TOKEN }}
          NPM_INTERNAL_REGISTRY: ${{ vars.NPM_INTERNAL_REGISTRY }}
        run: |
          set -euo pipefail
          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "no npm token configured (NPM_TOKEN or NPM_INTERNAL_TOKEN); running 'npm publish --dry-run' instead."
            npm publish --dry-run
            exit 0
          fi
          # --provenance attaches a signed attestation linking the package
          # to this workflow run (requires id-token: write and a public repo).
          # Disable provenance automatically when publishing to a non-npmjs
          # registry that doesn't support sigstore.
          if [[ -z "${NPM_INTERNAL_REGISTRY:-}" ]]; then
            npm publish --access public --provenance
          else
            npm publish --access public
          fi
          echo "publish step finished"
