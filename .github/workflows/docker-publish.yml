name: build + push portal images to GHCR

# Builds the API and Web container images and pushes them to GitHub
# Container Registry (ghcr.io). The Helm chart's default `values.yaml`
# references these images.
#
# Triggers:
#   - Push to main → tag images with `main` + the commit short SHA.
#   - Push of a semver tag (v*.*.*) → tag images with the version + `latest`.
#   - Pull requests touching the Dockerfiles or this workflow → build only,
#     no push (smoke test).
#   - Manual dispatch with an explicit tag override.

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.api"
      - "web/Dockerfile"
      - "cmd/fdh-portal-api/**"
      - "internal/portalapi/**"
      - "internal/cli/**"
      - "pkg/**"
      - "web/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/docker-publish.yml"
    tags:
      - "v*.*.*"
  pull_request:
    paths:
      - "Dockerfile.api"
      - "web/Dockerfile"
      - "web/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Explicit tag for the images (overrides the auto-derived one)"
        required: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/askenaz-dev/fdh-portal-api
  WEB_IMAGE: ghcr.io/askenaz-dev/fdh-portal-web

jobs:
  build-and-push:
    name: ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: .
            dockerfile: Dockerfile.api
            image: ghcr.io/askenaz-dev/fdh-portal-api
          - component: web
            context: ./web
            dockerfile: ./web/Dockerfile
            image: ghcr.io/askenaz-dev/fdh-portal-web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            # On semver tag push: vX.Y.Z, X.Y.Z, X.Y, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # On main: branch name + short SHA
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            # On PR: pr-<num>
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=fdh-portal-${{ matrix.component }}
            org.opencontainers.image.description=Forge Development Hub portal ${{ matrix.component }}
            org.opencontainers.image.source=https://github.com/askenaz-dev/forge-development-hub-cli
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # Push on main + tags + dispatch, but not on PRs (PRs only build).
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
