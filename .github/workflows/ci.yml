name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref so the latest push wins.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify go.mod is tidy
        shell: bash
        run: |
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum; then
            echo "::error::go.mod / go.sum are not tidy. Run 'go mod tidy' locally."
            git diff -- go.mod go.sum
            exit 1
          fi

      - name: Build
        run: task build

      - name: Test
        run: task test

      - name: Smoke (portal-api subprocess)
        run: task smoke

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  vet:
    name: vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

  scripts:
    name: install-scripts (shellcheck + PowerShell parse-check)
    # Lints scripts/install.sh with shellcheck and parse-checks
    # scripts/install.ps1 with the PowerShell tokenizer. Both are
    # deferred-with-CI tasks from
    # openspec/changes/implement-cli-distribution-and-interactive-init/tasks.md
    # (7.9 and 8.9). Smoke-running the scripts end-to-end is out of
    # scope here because that requires real release artifacts; the goal
    # of this job is to catch syntax regressions before a tag push.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: shellcheck install.sh
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck --severity=warning scripts/install.sh

      - name: PowerShell parse-check install.ps1
        shell: pwsh
        run: |
          $errors = $null
          $tokens = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path scripts/install.ps1).Path,
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors -and $errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }
          Write-Host "install.ps1 parses cleanly."

  web:
    name: web (typecheck + i18n parity + build + a11y)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-go@v5
        # ^ kept as setup-go syntax shape to keep this PR small; replace
        # with actions/setup-node@v4 in a follow-up. Node 22 LTS aligns
        # with the Dockerfile.
      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript
        run: pnpm typecheck

      - name: i18n parity
        run: pnpm i18n:check

      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: a11y smoke (axe-core)
        run: pnpm a11y
