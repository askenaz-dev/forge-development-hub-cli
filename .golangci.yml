# golangci-lint configuration for fdh.
# https://golangci-lint.run/usage/configuration/
#
# Ruleset is strict-but-pragmatic per task 1.6 of the installer-core change.
# The goal is to catch real bugs and style drift without drowning authors in
# noise; rules with high false-positive rates are intentionally disabled.

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    # Correctness
    - govet            # reports suspicious constructs
    - staticcheck      # comprehensive static analysis (includes gosimple in v2)
    - errcheck         # unchecked errors are a top bug source
    - ineffassign      # ineffective assignments
    - unused           # unused declarations
    - misspell         # English spelling
    # Targeted bug catchers
    - bodyclose        # HTTP response bodies must be closed
    - rowserrcheck     # database/sql rows.Err()
    - sqlclosecheck    # database/sql Close()
    - errorlint        # errors.Is / errors.As correctness
    - nilerr           # returning nil after detecting a non-nil error

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment # micro-optimization noise; opt in per-package if needed
        - shadow         # high false-positive rate on idiomatic err shadowing
    # errcheck uses defaults: flag unchecked returned errors. The
    # `check-type-assertions` and `check-blank` extra modes were
    # tried initially but produced ~190 issues across CLI command
    # files where ignoring fmt/print returns is idiomatic. Opt into
    # the stricter modes per-package via nolint directives if needed.
    misspell:
      locale: US
    staticcheck:
      checks: ["all"]

  exclusions:
    # Reasonable test-file exceptions: tests sometimes legitimately ignore
    # errors in setup code and use long functions for table-driven cases.
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - errorlint
      - path: internal/testutil/
        linters:
          - errcheck
      # CLI command files routinely ignore returns from fmt.Print*
      # writing to stdout/stderr; flagging each one buries the real
      # bug-class signal errcheck is meant to surface.
      - path: internal/cli/
        linters:
          - errcheck

formatters:
  enable:
    - gofmt            # canonical formatting
    - goimports        # import ordering + grouping
  settings:
    goimports:
      local-prefixes:
        - github.com/forge/fdh

issues:
  # Default golangci-lint hides issues already-fixed-by-master-branch; we
  # want to see all issues in the current diff.
  max-issues-per-linter: 0
  max-same-issues: 0
