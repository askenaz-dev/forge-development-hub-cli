openapi: 3.1.0
info:
  title: FDH Portal API
  version: "1.0.0"
  description: |
    Read-only HTTP API serving the forge Development Hub skill registry
    to the portal frontend and other automation.

    The API is a thin JSON view over the Git-backed registry consumed via
    `pkg/registry.Registry`. There is exactly one definition of the registry
    shape across the CLI and the portal.
  license:
    name: MIT

servers:
  - url: /api/v1
    description: Versioned API root

paths:
  /skills:
    get:
      operationId: listSkills
      summary: List skills in the catalog
      parameters:
        - in: query
          name: q
          schema: { type: string }
          description: Case-insensitive substring across name, namespace, description, tags
        - in: query
          name: namespace
          schema: { type: string }
        - in: query
          name: tag
          schema: { type: string }
        - in: query
          name: scan_status
          schema: { type: string, enum: [pass, warn, fail, none] }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: Page of skill summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsPage"

  /skills/{namespace}/{name}:
    get:
      operationId: getSkill
      summary: Full manifest for one skill
      parameters:
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/Name"
      responses:
        "200":
          description: Skill manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillManifest"
        "404":
          $ref: "#/components/responses/NotFound"

  /skills/{namespace}/{name}/versions/{version}:
    get:
      operationId: getSkillVersion
      summary: Metadata for one published version
      parameters:
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/Version"
      responses:
        "200":
          description: Version metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillVersion"
        "404":
          $ref: "#/components/responses/NotFound"

  /skills/{namespace}/{name}/versions/{version}/skill-md:
    get:
      operationId: getSkillMarkdown
      summary: Raw SKILL.md content of one published version
      parameters:
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/Version"
      responses:
        "200":
          description: SKILL.md body
          content:
            text/markdown:
              schema: { type: string }
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/me:
    get:
      operationId: getCurrentUser
      summary: Identity + portal role for the calling principal
      responses:
        "200":
          description: User identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserIdentity"

  /refresh:
    post:
      operationId: forceRefresh
      summary: Force an immediate registry re-read (publisher+ role required)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Refresh complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # --- Telemetry ingest (capability hub-usage-telemetry, design D2) ----------
  # Anonymous: NO bearer, NO service-token. Strict-decoded (unknown fields
  # rejected), size-capped, rate-limited. 202 accept / 400 invalid / best-effort
  # drop on store outage (still 202). The admin analytics/observability/feedback
  # read paths are Stage 2 and are NOT declared here yet.
  /telemetry:
    post:
      operationId: ingestTelemetry
      summary: Anonymous usage-telemetry ingest
      description: |
        Accepts a single pseudonymous usage event (install/download/resolve/
        activation/feedback) into the persistent telemetry store. No identity is
        required, accepted, or recorded; presenting a service credential confers
        no privilege. The body is strict-decoded against the closed schema —
        unknown fields (e.g. any PII field) are rejected with 400. When the store
        is unavailable the event is best-effort dropped and the response is still
        202 (ingest never blocks a client).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelemetryEvent"
      responses:
        "202":
          description: Event accepted (or best-effort dropped on store outage)
          content:
            application/json:
              schema:
                type: object
                required: [accepted]
                properties:
                  accepted: { type: boolean, enum: [true] }
        "400":
          description: Schema-invalid event (unknown field or bad enum)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Ingest rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Admin analytics / observability / feedback / activity (Stage 2) -------
  # Capability hub-usage-telemetry (design D3/D5/D6/D7/D8). ALL admin-gated
  # exactly like GET /api/v1/admin/activation; reached from the web ONLY via the
  # portal BFF service credential (a Keycloak client-credentials token mapped to
  # admin), NEVER a forwarded user bearer. Every analytics payload is an
  # AGGREGATE — no endpoint returns a per-identity row or maps an install_id to
  # an identity. On a degraded store these return 503 store_unavailable with a
  # Retry-After header, not 500. The voluntary install claim/activity surface is
  # the SINGLE explicit identity↔telemetry link (design D5).
  /admin/analytics/summary:
    get:
      operationId: getAnalyticsSummary
      summary: Aggregate telemetry counts and per-event breakdown
      description: Total retained events, the per-event-type breakdown, and the earliest retained timestamp. Aggregate only.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Aggregate summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/StoreUnavailable"

  /admin/analytics/top:
    get:
      operationId: getAnalyticsTop
      summary: Most-installed or most-downloaded components (aggregate)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: metric
          schema: { type: string, enum: [install, download], default: install }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 10 }
      responses:
        "200":
          description: Aggregate top components
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsTop"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/StoreUnavailable"

  /admin/analytics/trends:
    get:
      operationId: getAnalyticsTrends
      summary: Per-day event counts over a window (aggregate)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: event
          schema: { type: string, enum: [install, download, resolve, activation], default: install }
        - in: query
          name: days
          schema: { type: integer, minimum: 1, maximum: 365, default: 30 }
      responses:
        "200":
          description: Aggregate per-day trend points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsTrends"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/StoreUnavailable"

  /admin/analytics/funnel:
    get:
      operationId: getAnalyticsFunnel
      summary: Onboarding funnel step counts (aggregate)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Aggregate funnel steps from activation events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsFunnel"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/StoreUnavailable"

  /admin/observability:
    get:
      operationId: getObservability
      summary: First-party site and component health
      description: Uptime, request totals, error rate, latency percentiles, store health, and per-component scan status from first-party metrics + store aggregates. Renders without an external Prometheus query source.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: First-party health snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Observability"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/feedback:
    get:
      operationId: getFeedback
      summary: Paginated raw feedback list
      description: Persisted feedback events (newest first), paginated, plus the total count. Renders without any LLM. No identity is stored on a feedback row.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Paginated feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackList"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/StoreUnavailable"

  /admin/feedback/summary:
    get:
      operationId: getFeedbackSummary
      summary: Optional LLM-synthesized feedback digest (feature-flagged)
      description: When TELEMETRY_FEEDBACK_SUMMARY is on AND a provider is configured, returns a synthesized digest; otherwise returns {enabled:false} with NO LLM dependency.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Feedback summary (or disabled marker)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackSummary"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/activity/claim:
    post:
      operationId: claimInstall
      summary: Voluntarily link a machine's install id to a profile (the single identity↔telemetry link)
      description: |
        Records the user-initiated claim that links a pseudonymous install_id to
        the signed-in user's email, in the SEPARATE install_claims table. This is
        the only place the platform maps an install_id to an identity, and only
        because the user explicitly claimed it (design D5). The events table stays
        PII-free; nothing reverses an install_id.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimRequest"
      responses:
        "202":
          description: Claim recorded
          content:
            application/json:
              schema:
                type: object
                required: [claimed]
                properties:
                  claimed: { type: boolean, enum: [true] }
        "400":
          description: Missing install_id or user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/StoreUnavailable"

  /admin/activity:
    get:
      operationId: getActivity
      summary: A user's voluntarily-claimed installs
      description: Installs the given user explicitly claimed (design D5), newest first. Appears only after a claim — never by reversing an unclaimed id. Empty list for an unknown user.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: user
          schema: { type: string }
          description: The signed-in user's email (the BFF passes the session user's own email).
      responses:
        "200":
          description: Claimed installs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/StoreUnavailable"

  # --- Component catalog (kind-aware; skills are the kind=skill view) --------
  /components:
    get:
      operationId: listComponents
      summary: List components across all four kinds
      parameters:
        - in: query
          name: kind
          schema: { type: string, enum: [skill, rule, agent, hook] }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: namespace
          schema: { type: string }
        - in: query
          name: tag
          schema: { type: string }
        - in: query
          name: scan_status
          schema: { type: string, enum: [pass, warn, fail, none] }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: Page of component summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentsPage"
        "400":
          $ref: "#/components/responses/NotFound"

  /components/{kind}/{namespace}/{name}:
    get:
      operationId: getComponent
      summary: Full manifest for one component
      parameters:
        - $ref: "#/components/parameters/Kind"
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/Name"
      responses:
        "200":
          description: Component manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentManifest"
        "404":
          $ref: "#/components/responses/NotFound"

  /components/{kind}/{namespace}/{name}/versions/{version}:
    get:
      operationId: getComponentVersion
      summary: Metadata for one published component version
      parameters:
        - $ref: "#/components/parameters/Kind"
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/Version"
      responses:
        "200":
          description: Version metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentVersion"
        "404":
          $ref: "#/components/responses/NotFound"

  /components/{kind}/{namespace}/{name}/versions/{version}/document:
    get:
      operationId: getComponentDocument
      summary: Raw entrypoint markdown (SKILL.md/RULE.md/AGENT.md/HOOK.md) of one version
      parameters:
        - $ref: "#/components/parameters/Kind"
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/Version"
      responses:
        "200":
          description: Entrypoint markdown body
          content:
            text/markdown:
              schema: { type: string }
        "404":
          $ref: "#/components/responses/NotFound"

  # --- Wire-protocol endpoints ----------------------------------------------
  # The contract for these endpoints lives in the `hub-http-registry`
  # specification in forge-development-hub. Each path uses a per-path
  # `servers:` override so the URL is rooted at "/" rather than the UI
  # `/api/v1` prefix.
  /v1/index.json:
    servers:
      - url: /
        description: Wire-protocol root (consumed by pkg/registry.HTTPRegistry)
    get:
      operationId: getWireIndex
      summary: Top-level catalog of skill components (wire protocol)
      responses:
        "200":
          description: Catalog snapshot
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireIndex"
        "304":
          description: Not modified (If-None-Match matched current ETag)
        "503":
          description: Hub catalog not yet mounted on this pod
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireError"

  /v1/{kindPlural}/{namespace}/{name}/manifest.json:
    servers:
      - url: /
    get:
      operationId: getWireManifest
      summary: Per-component manifest (wire protocol)
      parameters:
        - $ref: "#/components/parameters/KindPlural"
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/Name"
      responses:
        "200":
          description: Component manifest
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireManifest"
        "304":
          description: Not modified
        "404":
          description: Component or namespace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireError"

  /v1/{kindPlural}/{namespace}/{name}/versions/{version}/bundle.tar.gz:
    servers:
      - url: /
    get:
      operationId: getWireBundleTarball
      summary: Deterministic gzipped tarball of a component version
      parameters:
        - $ref: "#/components/parameters/KindPlural"
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/Version"
      responses:
        "200":
          description: Gzipped tarball bytes (deterministic across builds)
          headers:
            ETag: { schema: { type: string } }
            Cache-Control:
              schema: { type: string, default: "public, max-age=31536000, immutable" }
          content:
            application/gzip:
              schema: { type: string, format: binary }
        "304":
          description: Not modified
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireError"

  /v1/{kindPlural}/{namespace}/{name}/versions/{version}/bundle.sha256:
    servers:
      - url: /
    get:
      operationId: getWireBundleSidecar
      summary: Canonical content-hash sidecar for the bundle
      parameters:
        - $ref: "#/components/parameters/KindPlural"
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/Version"
      responses:
        "200":
          description: "Single line: <hex>  bundle.tar.gz\\n"
          headers:
            ETag: { schema: { type: string } }
            Cache-Control:
              schema: { type: string, default: "public, max-age=31536000, immutable" }
          content:
            text/plain:
              schema: { type: string }
        "304":
          description: Not modified
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireError"

  # --- GitOps write surface (capability portal-gitops-write) -----------------
  # Role-gated CONFIG-via-PR write actions. Each opens EXACTLY one pull request
  # on forge-development-hub via the portal-owned GitHub App ("the bot"). The bot
  # can OPEN but can NEVER MERGE a PR — a human merges it under branch protection
  # (no merge path exists in this server). Authorization uses the Phase-1 BFF
  # portal SERVICE CREDENTIAL (a Keycloak client-credentials token validated by
  # the same JWKS pipeline as every other bearer-gated path, mapped to a role),
  # NOT a user IdP bearer (the web strips it from the session cookie). The
  # requesting user's identity + role ride along as trusted metadata for PR
  # attribution only. The role minimum is re-enforced here via HasMinRole
  # (authoritative), independent of the BFF's advisory pre-check. Precedence:
  # anonymous < consumer < author < reviewer < publisher < admin. When the
  # GitHub App is not configured these return 503 gitops_not_configured (never
  # 500). The success body carries the opened PR's URL.
  /gitops/import:
    post:
      operationId: gitopsImport
      summary: Import a component (author+) — bot opens a PR adding it as non-default
      description: |
        Imports a component from the web (skill-first). Accepts either a
        multipart zip upload (field `bundle`) or a JSON skill-form. The server
        runs the SAME validators the CLI runs (`pkg/bundle.Load`/`Validate`, the
        portability lint, `pkg/scan.DirStatus`) and ABORTS BEFORE ANY PUSH on
        failure, naming the failing check. On success the bot opens one PR on a
        deterministic branch `web/import/<kind>/<name>` adding the bundle tree
        under `<kind>s/<name>/` and a `hub/registry.yaml` v2 entry with
        `default: false` and `agents_supported` from the bundle. The bot opens
        but never merges. Minimum role: `author`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/GitopsImportMultipart"
          application/json:
            schema:
              $ref: "#/components/schemas/GitopsImportForm"
      responses:
        "201":
          description: Import PR opened by the bot (never merged)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitopsPRResult"
        "200":
          description: An open PR for this action already exists (idempotent) — its URL is returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitopsPRResult"
        "400":
          description: Malformed request (bad multipart/JSON, missing kind/name)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: Validation failed, unsupported kind, or a name collision (no PR created)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          $ref: "#/components/responses/GitopsNotConfigured"

  /gitops/harness:
    post:
      operationId: gitopsHarness
      summary: Edit a harness (publisher+) — bot opens a PR touching only harnesses.yaml
      description: |
        Edits one harness in `hub/harnesses.yaml` (add/remove components per kind,
        edit `description`/`owner_team`). Every ADDED component must exist in the
        live catalog; an unknown reference is rejected (422) before composing so
        harness validation cannot fail in CI. The bot opens one PR on
        `web/harness/<harness-name>` whose only changed file is
        `hub/harnesses.yaml`. The bot opens but never merges. Minimum role:
        `publisher`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitopsHarnessRequest"
      responses:
        "201":
          description: Harness PR opened by the bot (never merged)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitopsPRResult"
        "200":
          description: An open PR for this harness already exists (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitopsPRResult"
        "400":
          description: Malformed request (missing harness name)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: A referenced component does not exist in the catalog (no PR created)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          $ref: "#/components/responses/GitopsNotConfigured"

  /gitops/curate:
    post:
      operationId: gitopsCurate
      summary: Curate default + lifecycle (admin) — bot opens a PR editing the registry
      description: |
        Sets a component's `default: true|false` (Gate 3) or drives a forward-only
        lifecycle transition (`deprecate`/`yank`) on a version. A default change
        ALSO edits the `default` harness in `hub/harnesses.yaml` in the SAME
        atomic commit so CI's cross-reference stays green. Lifecycle is
        forward-only (`active → deprecated → yanked`); un-yank is rejected (422)
        and no PR is created. The bot opens one PR on
        `web/curate/<kind>/<name>`. The bot opens but never merges. Minimum role:
        `admin`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitopsCurateRequest"
      responses:
        "201":
          description: Curate PR opened by the bot (never merged)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitopsPRResult"
        "200":
          description: An open PR for this entry already exists (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitopsPRResult"
        "400":
          description: Malformed request (missing kind/name)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: Rejected lifecycle transition (e.g. un-yank) — no PR created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          $ref: "#/components/responses/GitopsNotConfigured"

components:
  parameters:
    Namespace:
      in: path
      name: namespace
      required: true
      schema: { type: string, pattern: "^[a-z0-9]+(-[a-z0-9]+)*$" }
    Name:
      in: path
      name: name
      required: true
      schema: { type: string, pattern: "^[a-z0-9]+(-[a-z0-9]+)*$" }
    Version:
      in: path
      name: version
      required: true
      schema: { type: string }
    KindPlural:
      in: path
      name: kindPlural
      required: true
      description: Plural URL segment identifying the component kind.
      schema:
        type: string
        enum: [skills, rules, agents, hooks]
    Kind:
      in: path
      name: kind
      required: true
      description: Singular component kind.
      schema:
        type: string
        enum: [skill, rule, agent, hook]

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Token valid but insufficient role
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    StoreUnavailable:
      description: Telemetry store temporarily unavailable (retry); never a 500
      headers:
        Retry-After:
          schema: { type: string }
          description: Seconds to wait before retrying.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    GitopsNotConfigured:
      description: |
        The portal GitHub App is not configured, so the web write surface is
        unavailable. The API still serves catalog/admin reads. This is a typed
        503 (never a 500): the code ships dark and lights up when the App secret
        is wired by an org owner.
      headers:
        Retry-After:
          schema: { type: string }
          description: Seconds to wait before retrying.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SkillsPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/SkillSummary" }
        next_cursor:
          type: [string, "null"]

    SkillSummary:
      type: object
      required: [namespace, name, latest_version, latest_hash, scan_status]
      properties:
        namespace: { type: string }
        name: { type: string }
        description: { type: string }
        owner_team: { type: string }
        tags:
          type: array
          items: { type: string }
        latest_version: { type: string }
        latest_hash: { type: string }
        scan_status: { type: string, enum: [pass, warn, fail, none] }

    SkillManifest:
      type: object
      required: [namespace, name, latest, versions]
      properties:
        namespace: { type: string }
        name: { type: string }
        description: { type: string }
        owner_team: { type: string }
        tags:
          type: array
          items: { type: string }
        latest: { type: string }
        versions:
          type: array
          items: { $ref: "#/components/schemas/SkillVersion" }

    SkillVersion:
      type: object
      required: [version, content_hash, published_at, scan_status]
      properties:
        version: { type: string }
        content_hash: { type: string }
        published_at: { type: string, format: date-time }
        published_by: { type: string }
        changelog_url: { type: string }
        scan_status: { type: string, enum: [pass, warn, fail, none] }
        signature: { type: string }
        skill_md_url: { type: string, format: uri }

    ComponentsPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ComponentSummary" }
        next_cursor:
          type: [string, "null"]

    ComponentSummary:
      type: object
      required: [kind, namespace, name, latest_version, latest_hash, scan_status]
      properties:
        kind: { type: string, enum: [skill, rule, agent, hook] }
        namespace: { type: string }
        name: { type: string }
        description: { type: string }
        owner_team: { type: string }
        tags:
          type: array
          items: { type: string }
        latest_version: { type: string }
        latest_hash: { type: string }
        scan_status: { type: string, enum: [pass, warn, fail, none] }

    ComponentManifest:
      type: object
      required: [kind, namespace, name, latest, versions]
      properties:
        kind: { type: string, enum: [skill, rule, agent, hook] }
        namespace: { type: string }
        name: { type: string }
        description: { type: string }
        owner_team: { type: string }
        tags:
          type: array
          items: { type: string }
        latest: { type: string }
        versions:
          type: array
          items: { $ref: "#/components/schemas/ComponentVersion" }

    ComponentVersion:
      type: object
      required: [version, content_hash, published_at, scan_status]
      properties:
        version: { type: string }
        content_hash: { type: string }
        published_at: { type: string, format: date-time }
        published_by: { type: string }
        scan_status: { type: string, enum: [pass, warn, fail, none] }
        signature: { type: string }
        document_url: { type: string, format: uri }

    UserIdentity:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [anonymous, consumer, author, reviewer, publisher, admin]
        sub: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        claims:
          type: array
          items: { type: string }

    RefreshResult:
      type: object
      required: [refreshed_at, skill_count]
      properties:
        refreshed_at: { type: string, format: date-time }
        skill_count: { type: integer }
        index_version: { type: string }

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }

    # --- Telemetry ingest schema (capability hub-usage-telemetry) ---
    # The CLOSED, minimal, pseudonymous event shape. additionalProperties:false
    # mirrors the server's strict decode: any field not listed (notably any PII
    # field — username/email/hostname/ip/path) is rejected with 400. There is
    # intentionally NO identity field; the only id is the rotating, salted,
    # pseudonymous install_id, which is not reversible to an identity.
    TelemetryEvent:
      type: object
      additionalProperties: false
      required: [event]
      properties:
        event:
          type: string
          enum: [install, download, resolve, activation, feedback]
        kind: { type: string, enum: [skill, rule, agent, hook] }
        namespace: { type: string }
        name: { type: string }
        version: { type: string }
        content_hash: { type: string, pattern: "^[a-f0-9]{64}$" }
        scope: { type: string }
        registry: { type: string }
        os:
          type: string
          enum: [darwin, linux, windows]
          description: Coarse OS family only — no arch, kernel, or version detail.
        locale: { type: string, enum: [es, en] }
        install_id:
          type: string
          description: Pseudonymous rotating salted hash; not reversible to identity.
        timestamp: { type: string, format: date-time }
        step:
          type: string
          description: Activation only — onboarding wizard step.
        wizard_session_id:
          type: string
          description: Activation only — wizard session id.
        rating:
          type: integer
          description: Feedback only — structured rating.
        category:
          type: string
          description: Feedback only — structured category.
        text:
          type: string
          description: Feedback only — free text.

    # --- Stage-2 admin analytics / observability / feedback / activity schemas
    # Every analytics schema is an AGGREGATE shape — there is intentionally NO
    # property that maps an install_id to an identity. The ONE identity↔telemetry
    # link is the explicit ClaimRequest (design D5).
    AnalyticsSummary:
      type: object
      required: [total, by_event, since]
      properties:
        total: { type: integer }
        by_event:
          type: object
          properties:
            install: { type: integer }
            download: { type: integer }
            resolve: { type: integer }
            activation: { type: integer }
            feedback: { type: integer }
        # RFC3339 timestamp of the earliest retained event, or "" when the store
        # has no retained events yet (fresh install / empty window). Not typed as
        # format:date-time because the empty-store response is the common case.
        since: { type: string }

    AnalyticsTop:
      type: object
      required: [metric, items]
      properties:
        metric: { type: string, enum: [install, download] }
        items:
          type: array
          items:
            type: object
            required: [kind, namespace, name, count]
            properties:
              kind: { type: string }
              namespace: { type: string }
              name: { type: string }
              count: { type: integer }

    AnalyticsTrends:
      type: object
      required: [event, points]
      properties:
        event: { type: string }
        points:
          type: array
          items:
            type: object
            required: [date, count]
            properties:
              date: { type: string, description: "YYYY-MM-DD (UTC)" }
              count: { type: integer }

    AnalyticsFunnel:
      type: object
      required: [steps]
      properties:
        steps:
          type: array
          items:
            type: object
            required: [step, count]
            properties:
              step: { type: string }
              count: { type: integer }

    Observability:
      type: object
      required: [uptime_seconds, requests_total, error_rate, latency_ms, store, components]
      properties:
        uptime_seconds: { type: integer }
        requests_total: { type: integer }
        error_rate: { type: number, format: float }
        latency_ms:
          type: object
          properties:
            p50: { type: number, format: float }
            p95: { type: number, format: float }
        store:
          type: object
          properties:
            available: { type: boolean }
            event_count: { type: integer }
        components:
          type: array
          items:
            type: object
            properties:
              kind: { type: string }
              name: { type: string }
              scan_status: { type: string, enum: [pass, warn, fail, none] }
        prometheus_query_url:
          type: string
          description: Present only when an optional external Prometheus query URL is configured.

    FeedbackList:
      type: object
      required: [items, count]
      properties:
        count: { type: integer }
        items:
          type: array
          items:
            type: object
            required: [rating, category, text, ts]
            properties:
              rating: { type: integer }
              category: { type: string }
              text: { type: string }
              ts: { type: string, format: date-time }

    FeedbackSummary:
      type: object
      required: [enabled, summary, generated_at]
      properties:
        enabled:
          type: boolean
          description: false when the flag is off or no provider is configured (no LLM dependency).
        summary: { type: string }
        generated_at: { type: string }

    ClaimRequest:
      type: object
      additionalProperties: false
      required: [install_id, user]
      properties:
        install_id:
          type: string
          description: The pseudonymous machine install id the user copied from `fdh telemetry claim`.
        user:
          type: string
          description: The signed-in user's own email (the BFF passes the session user's email).

    Activity:
      type: object
      required: [installs]
      properties:
        installs:
          type: array
          items:
            type: object
            required: [kind, name, version, ts]
            properties:
              kind: { type: string }
              name: { type: string }
              version: { type: string }
              ts: { type: string, format: date-time }

    # --- Wire-protocol schemas ---
    WireIndex:
      type: object
      required: [schema_version, registry, components]
      properties:
        schema_version: { type: integer, enum: [2] }
        registry: { type: string }
        components:
          type: array
          items: { $ref: "#/components/schemas/WireIndexEntry" }

    WireIndexEntry:
      type: object
      required: [kind, namespace, name, description, owner_team, latest_version, latest_hash, scan_status]
      properties:
        kind: { type: string, enum: [skill, rule, agent, hook] }
        namespace: { type: string, enum: [forge] }
        name: { type: string }
        description: { type: string }
        owner_team: { type: string }
        tags:
          type: array
          items: { type: string }
        latest_version: { type: string }
        latest_hash: { type: string, pattern: "^[a-f0-9]{64}$" }
        scan_status: { type: string, enum: [pass, warn, fail, none] }

    WireManifest:
      type: object
      required: [schema_version, namespace, name, description, owner_team, latest, versions]
      properties:
        schema_version: { type: integer, enum: [1] }
        namespace: { type: string, enum: [forge] }
        name: { type: string }
        description: { type: string }
        owner_team: { type: string }
        tags:
          type: array
          items: { type: string }
        latest: { type: string }
        versions:
          type: array
          items: { $ref: "#/components/schemas/WireVersion" }

    WireVersion:
      type: object
      required: [version, content_hash, published_at, published_by, scan_status]
      properties:
        version: { type: string }
        content_hash: { type: string, pattern: "^[a-f0-9]{64}$" }
        published_at: { type: string, format: date-time }
        published_by: { type: string }
        scan_status: { type: string, enum: [pass, warn, fail, none] }

    WireError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum: [not_found, hub_not_ready, catalog_unreadable, encode_failed, tarball_build_failed, unsupported_entry, hash_failed]
        namespace: { type: string }
        name: { type: string }
        version: { type: string }
        message: { type: string }
        message: { type: string }
        namespace: { type: string }
        name: { type: string }
        version: { type: string }

    # --- GitOps write schemas (capability portal-gitops-write) ---------------
    GitopsPRResult:
      type: object
      description: |
        The result of a GitOps write action. `pr_url` is the URL of the pull
        request the bot opened (or, when `already_open` is true, the pre-existing
        open PR for the deterministic branch — idempotency). `merged` is always
        false: the bot is propose-only and cannot merge.
      required: [pr_url, branch, already_open, merged]
      properties:
        pr_url: { type: string, format: uri, description: "URL of the bot-opened pull request on forge-development-hub." }
        branch: { type: string, description: "Deterministic head branch the action targeted." }
        already_open: { type: boolean, description: "True when an open PR for this action already existed and was returned instead of opening a duplicate." }
        merged: { type: boolean, enum: [false], description: "Always false — the bot opens but never merges (a human merges under branch protection)." }

    GitopsImportForm:
      type: object
      description: JSON skill-form import. The trusted requesting user/role is resolved server-side from the principal, not from this body.
      required: [kind, name]
      properties:
        kind: { type: string, enum: [skill], description: "Importable kind (skill-first)." }
        name: { type: string, pattern: "^[a-z0-9]+(-[a-z0-9]+)*$" }
        description: { type: string, description: "Used to synthesize an entrypoint when no files are supplied." }
        owner_team: { type: string }
        agents:
          type: array
          items: { type: string, enum: [claude-code, codex, copilot, opencode] }
        files:
          type: object
          description: "Map of bundle-relative path → file content. Must include the kind's entrypoint (e.g. SKILL.md) unless a description is given."
          additionalProperties: { type: string }

    GitopsImportMultipart:
      type: object
      description: Multipart zip import. The `bundle` field carries the zipped component bundle.
      required: [kind, name, bundle]
      properties:
        kind: { type: string, enum: [skill] }
        name: { type: string, pattern: "^[a-z0-9]+(-[a-z0-9]+)*$" }
        owner_team: { type: string }
        agents: { type: string, description: "Comma-separated agent ids." }
        bundle: { type: string, format: binary, description: "Zip archive of the component bundle (size-capped)." }

    GitopsHarnessRequest:
      type: object
      description: Harness edit. Add/remove are per kind; description/owner_team are optional scalar replacements. Every added component must exist in the catalog.
      required: [harness]
      properties:
        harness: { type: string }
        description: { type: string }
        owner_team: { type: string }
        add_skills: { type: array, items: { type: string } }
        remove_skills: { type: array, items: { type: string } }
        add_rules: { type: array, items: { type: string } }
        remove_rules: { type: array, items: { type: string } }
        add_agents: { type: array, items: { type: string } }
        remove_agents: { type: array, items: { type: string } }
        add_hooks: { type: array, items: { type: string } }
        remove_hooks: { type: array, items: { type: string } }

    GitopsCurateRequest:
      type: object
      description: |
        Curate action. Provide EITHER set_default (Gate-3 default flag; the same
        PR syncs the `default` harness atomically) OR a forward-only lifecycle
        transition (deprecate/yank) on a version. Un-yank is rejected.
      required: [kind, name]
      properties:
        kind: { type: string, enum: [skill, rule, agent, hook] }
        name: { type: string, pattern: "^[a-z0-9]+(-[a-z0-9]+)*$" }
        set_default: { type: boolean, description: "Set the registry default flag; syncs the default harness atomically." }
        lifecycle: { type: string, enum: [deprecate, yank], description: "Forward-only lifecycle transition (requires version)." }
        version: { type: string, description: "Target version for a lifecycle transition." }
