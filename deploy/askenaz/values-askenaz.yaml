# Production Helm values for the askenaz.dev deployment of fdh-portal.
#
# Use:
#   helm upgrade --install fdh-portal ./deploy/helm/fdh-portal \
#     --namespace fdh --create-namespace \
#     -f ./deploy/askenaz/values-askenaz.yaml
#
# This file is checked in. It contains NO secrets — those live in the
# Kubernetes Secret created by setup-k8s.ps1.

api:
  image:
    # Tag is set per release; use chart appVersion in dev. For a pinned
    # release, override with `--set api.image.tag=v0.1.0` (or edit here).
    tag: ""
    pullPolicy: IfNotPresent

web:
  image:
    tag: ""
    pullPolicy: IfNotPresent

# GHCR images are public — no pullSecret needed by default.
imagePullSecrets: []

portal:
  registryURL: "https://github.com/askenaz-dev/forge-development-hub.git"
  registryBranch: "main"
  refreshInterval: "60s"

oidc:
  discoveryURL: "https://keycloak.askenaz.dev/realms/askenaz"
  clientID: "fdh-portal"
  clientSecretRef:
    name: "fdh-portal-oidc"
    key: "client_secret"
  roleMapConfigMap: "fdh-portal-role-map"

observability:
  prometheus:
    serviceMonitor: false   # flip to true once Prometheus/operator is in cluster
    interval: 30s
  otel:
    endpoint: ""            # e.g. http://otel-collector.observability:4317

ingress:
  enabled: true
  className: "nginx"
  host: "fdh.askenaz.dev"
  # Canonical host only. The deprecated agent-skills.askenaz.dev is NOT served
  # by the origin — any redirect from it to fdh.askenaz.dev is handled at the
  # Cloudflare edge (a Redirect Rule), since ingress-nginx v1.14 rejects the
  # permanent-redirect annotation's $request_uri and has snippets disabled.
  aliasHosts: []
  tls:
    # TLS terminates at Cloudflare; the origin Ingress serves plain HTTP on
    # :80. No in-cluster cert secret is referenced while this is false.
    enabled: false
    secretName: "cloudflare-origin-tls"
  annotations:
    # Optional hardening (uncomment what you want):
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/proxy-body-size: "10m"

service:
  type: ClusterIP
