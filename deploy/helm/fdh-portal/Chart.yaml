apiVersion: v2
name: fdh-portal
description: |
  Helm chart that deploys the Forge Development Hub portal — API + Web
  fronted by a single Ingress, with optional Prometheus ServiceMonitor +
  OTel collector wiring.

  Keycloak is NOT deployed by this chart; consume an existing Keycloak by
  configuring the OIDC discovery URL and client secret via values.yaml +
  a referenced Kubernetes Secret.
type: application
# `version` may be bumped normally. It feeds the `helm.sh/chart` label, but the
# API StatefulSet's volumeClaimTemplates now stamp only the STABLE selectorLabels
# (name + instance + component) — NOT chart/version-dependent labels — so a
# version bump no longer mutates the immutable VCT field and an in-place
# `helm upgrade` succeeds. (Previously PINNED at 0.2.0 because the VCT carried the
# full label set incl. helm.sh/chart; decoupling it required a one-time
# orphan-delete + StatefulSet recreate, performed while on 0.2.0. 0.2.1 is the
# first version bumped in-place under the new scheme. See the rationale in
# templates/api-statefulset.yaml.)
version: 0.2.3
appVersion: "0.1.0"
keywords:
  - fdh
  - forge
  - agent-harness
  - portal
  - askenaz
home: https://fdh.askenaz.dev
sources:
  - https://github.com/askenaz-dev/forge-development-hub-cli
maintainers:
  - name: askenaz
    email: hi@askenaz.dev
