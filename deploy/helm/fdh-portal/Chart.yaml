apiVersion: v2
name: fdh-portal
description: |
  Helm chart that deploys the Forge Development Hub portal — API + Web
  fronted by a single Ingress, with optional Prometheus ServiceMonitor +
  OTel collector wiring.

  Keycloak is NOT deployed by this chart; consume an existing Keycloak by
  configuring the OIDC discovery URL and client secret via values.yaml +
  a referenced Kubernetes Secret.
type: application
# Keep `version` PINNED. It feeds the `helm.sh/chart` label, which the API
# StatefulSet stamps onto its volumeClaimTemplates — an immutable field. Bumping
# it makes an in-place `helm upgrade` fail ("updates to statefulset spec for
# fields other than 'template' … are forbidden"). Ship template changes (e.g.
# ingress paths) WITHOUT a version bump. Decoupling this (VCT labels →
# selectorLabels) needs a one-time orphan-delete + recreate of the StatefulSet.
version: 0.2.0
appVersion: "0.1.0"
keywords:
  - fdh
  - forge
  - agent-harness
  - portal
  - askenaz
home: https://fdh.askenaz.dev
sources:
  - https://github.com/askenaz-dev/forge-development-hub-cli
maintainers:
  - name: askenaz
    email: hi@askenaz.dev
