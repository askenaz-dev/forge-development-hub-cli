apiVersion: v2
name: fdh-portal
description: |
  Helm chart that deploys the Falabella Development Hub portal — API + Web
  fronted by a single Ingress, with optional Prometheus ServiceMonitor +
  OTel collector wiring.

  Keycloak is NOT deployed by this chart; the platform identity team
  operates the canonical Keycloak. Configure the OIDC discovery URL and
  client secret via values.yaml + a referenced Kubernetes Secret.
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - fdh
  - falabella
  - agent-skills
  - portal
home: https://fdh.falabella.internal
sources:
  - https://github.com/falabella/fdh
maintainers:
  - name: Falabella Platform Engineering
