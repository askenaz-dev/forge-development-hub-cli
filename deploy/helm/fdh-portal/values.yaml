# Default values for fdh-portal.
#
# Production deploys override:
#   - image tags (api.image.tag, web.image.tag) if you don't want appVersion
#   - ingress.host (defaults to fdh.askenaz.dev)
#   - portal.registryURL (defaults to the askenaz-dev hub repo)
#   - oidc.* (defaults to keycloak.askenaz.dev / realm `askenaz`)
#   - oidc.clientSecretRef (Kubernetes Secret name + key)

api:
  replicaCount: 2
  image:
    repository: ghcr.io/askenaz-dev/fdh-portal-api
    tag: ""           # empty -> chart appVersion
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  # Per-pod persistent volume for the hub catalog clone (StatefulSet
  # volumeClaimTemplates). The cluster has only RWO local-path storage, so
  # each replica gets its own small PVC; the persisted clone lets a pod come
  # up Ready on restart without re-cloning from the remote at boot.
  persistence:
    storageClassName: ""   # empty -> cluster default StorageClass (local-path here)
    size: 1Gi

web:
  replicaCount: 2
  image:
    repository: ghcr.io/askenaz-dev/fdh-portal-web
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  # /etc/hosts overrides for the web pods. We pin the IdP host (keycloak.askenaz.dev)
  # to its Cloudflare edge IPs so the server-side OIDC backchannel (discovery /
  # token / jwks) never depends on the cluster's intermittently-failing DNS
  # forward to public resolvers — that flakiness surfaces as NextAuth
  # `error=Configuration` ("fetch failed") on the callback. Going via Cloudflare
  # (not the in-cluster service) is deliberate: the keycloak ingress has no TLS
  # cert of its own, so only Cloudflare presents a publicly-trusted cert for the
  # https issuer URL. Update these IPs if the zone's Cloudflare IPs ever change.
  hostAliases:
    - ip: "104.21.52.50"
      hostnames:
        - "keycloak.askenaz.dev"
    - ip: "172.67.195.145"
      hostnames:
        - "keycloak.askenaz.dev"

# Optional: if the GHCR images are private, reference a docker-registry
# Secret in this namespace. Leave empty when using public images (default).
imagePullSecrets: []
#  - name: ghcr-pull

portal:
  # Git remote URL of the production skill registry. The API clones this
  # into an emptyDir at startup and refreshes every refreshInterval.
  registryURL: "https://github.com/askenaz-dev/forge-development-hub.git"
  registryBranch: "main"
  refreshInterval: "60s"

oidc:
  # Deployment profile: "local" (self-hosted in-cluster OIDC, e.g. Keycloak)
  # or "external" (a managed OIDC provider: Entra ID / Okta / Auth0 / Google).
  # Informational only — the portal speaks standard OIDC either way via the
  # discoveryURL/clientID below; no code path is provider-specific. The portal
  # also tolerates the IdP being unreachable (the anonymous catalog stays up).
  # See docs/idp-profiles.md.
  profile: "local"
  # Full discovery URL — for `local`, the in-cluster Keycloak realm; for
  # `external`, the managed IdP's issuer / discovery URL.
  discoveryURL: "https://keycloak.askenaz.dev/realms/askenaz"
  clientID: "fdh-portal"
  # Reference a Kubernetes Secret holding the client secret + Auth.js
  # secret. The chart does NOT embed the secret value. Create the secret
  # separately, e.g.:
  #   kubectl create secret generic fdh-portal-oidc \
  #     --from-literal=client_secret=<from-keycloak> \
  #     --from-literal=auth_secret=$(openssl rand -hex 32) \
  #     --namespace fdh
  clientSecretRef:
    name: "fdh-portal-oidc"
    key: "client_secret"
  # The role-map ConfigMap is also referenced rather than embedded.
  roleMapConfigMap: "fdh-portal-role-map"

observability:
  prometheus:
    serviceMonitor: true
    interval: 30s
  otel:
    endpoint: ""    # e.g. http://otel-collector.observability:4317

# Usage telemetry store (hub-usage-telemetry, Phase 2).
#
# The portal's FIRST persistent datastore. It holds ONLY anonymous/pseudonymous
# TELEMETRY + USER-DATA (usage events, onboarding activation, feedback) — NEVER
# catalog CONFIG. "code = source of truth" is intact: the catalog stays the
# Git-derived clone on the API's registry-data PVC; telemetry never writes
# hub/registry.yaml, hub/harnesses.yaml, or any component.
#
# NON-FATAL BY DESIGN (portal-runtime-resilience): the API treats the store as
# strictly optional at boot. If FDH_TELEMETRY_DSN is unset, or Postgres is
# unreachable, the API still starts, anonymous catalog reads still serve, and
# ingest degrades to a best-effort drop (analytics reads return a typed
# store_unavailable). Enabling this block only makes telemetry DURABLE; it must
# never become a hard dependency of the portal.
#
# Disabled by default — the operator opts in. When enabled, this chart renders
# an in-cluster Postgres StatefulSet + headless Service + per-pod PVC and a
# Secret carrying POSTGRES_PASSWORD and the assembled FDH_TELEMETRY_DSN, and
# wires that DSN into the API StatefulSet env. With it disabled, NONE of those
# render and the API gets no FDH_TELEMETRY_DSN (telemetry simply stays
# best-effort/dropped, which is the intended off state).
telemetry:
  store:
    # Master switch. false -> no Postgres, no Secret, no DSN env on the API.
    enabled: false
    image:
      repository: postgres
      tag: "16-alpine"
      pullPolicy: IfNotPresent
    # Logical database + role the API connects as. The bootstrap password is
    # generated into the Secret on first render (see passwordSecret below) — or
    # supply your own existing Secret to avoid a chart-managed password.
    database: "fdh"
    user: "fdh"
    # Password handling. The chart assembles FDH_TELEMETRY_DSN as
    #   postgres://<user>:<password>@<svc>:5432/<database>?sslmode=disable
    # into a chart-managed Secret.
    #   - existingSecret: "" -> the chart creates the Secret and generates a
    #     random password on first install (preserved across upgrades via
    #     lookup). Set `password` to pin a deterministic value instead.
    #   - existingSecret: "my-secret" -> the chart creates NOTHING; it reads
    #     POSTGRES_PASSWORD and FDH_TELEMETRY_DSN from that pre-existing Secret
    #     (you own its lifecycle, e.g. a managed-Postgres DSN).
    existingSecret: ""
    # Optional explicit password. Empty -> a random one is generated (and kept
    # stable across upgrades). Ignored when existingSecret is set.
    password: ""
    # Per-pod persistent volume for Postgres data (StatefulSet
    # volumeClaimTemplates). RWO local-path like the API's registry PVC.
    persistence:
      storageClassName: ""   # empty -> cluster default StorageClass (local-path)
      size: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 512Mi

# Web → Git CONFIG write surface (portal-gitops-write, Phase 3).
#
# The portal's server-side write path to the hub: a portal-owned GitHub App
# ("the bot") opens — but can NEVER merge — pull requests on
# forge-development-hub. It is PROPOSE-ONLY (decision D3): Contents:write +
# Pull-requests:write on the hub repo only, no Administration, no merge. A leaked
# bot token can open spammy PRs but cannot corrupt the catalog, because branch
# protection still requires passing CI + a non-bot CODEOWNERS approval + no
# self-merge. The App private key lives ONLY in the API pod (this secretKeyRef),
# never in the browser or the web pod.
#
# SHIPS DARK / NON-FATAL BY DESIGN (portal-runtime-resilience): the Go API treats
# the GitHub App as STRICTLY OPTIONAL at boot. With this block disabled (the
# default), NONE of the GITHUB_APP_* / GITHUB_HUB_* env is set on the API; the
# gitops client constructs as a DISABLED client (gitops.ErrGitopsNotConfigured),
# the API still boots and serves catalog/admin reads, and the write endpoints
# return a typed 503 gitops_not_configured (never a 500, never a crash). Enabling
# this block "lights up" the write surface once an org owner has registered and
# installed the App and provisioned its credentials. The App registration/install
# is an awaits-org-owner runtime gate — the code ships before the secret exists.
#
# Mirrors how telemetry.store / oidc.clientSecretRef wire a secret: ADDITIVE,
# values-flag-gated, sourced from an existing or chart-managed Secret. Do NOT put
# real App id/key values here — supply them out-of-band via the Secret.
gitops:
  # Master switch. false (default) -> no GITHUB_APP_* env on the API, no Secret;
  # the write surface stays dark and the API is unaffected.
  enabled: false
  # The single hub repository the App is installed on (single-repo scope). These
  # are non-secret and default to the production hub; the API also defaults them
  # internally, so overriding here is optional.
  hub:
    owner: "askenaz-dev"
    repo: "forge-development-hub"
  # Optional GitHub REST API root override (GHES). Empty -> https://api.github.com.
  apiBaseURL: ""
  # GitHub App credentials, sourced from a Kubernetes Secret (NOT embedded here).
  #   - existingSecret: "<name>" -> the chart creates NO Secret; it reads the
  #     keys below from that pre-existing Secret. This is the production path —
  #     an org owner provisions the App id + private key + installation id into a
  #     Secret out-of-band, e.g.:
  #       kubectl create secret generic fdh-portal-gitops \
  #         --from-literal=GITHUB_APP_ID=<app-id> \
  #         --from-literal=GITHUB_APP_INSTALLATION_ID=<installation-id> \
  #         --from-file=GITHUB_APP_PRIVATE_KEY=./app-private-key.pem \
  #         --namespace fdh
  #   - existingSecret: "" -> the chart renders a Secret from the literals below
  #     (appId / installationID / privateKey). Intended for non-production / dummy
  #     overrides; leave the literals empty in committed values.
  existingSecret: ""
  # Keys to read inside the Secret. Defaults match the env var names the Go API
  # reads (internal/portalapi/gitops/github_client.go: ConfigFromEnv).
  secretKeys:
    appId: "GITHUB_APP_ID"
    installationID: "GITHUB_APP_INSTALLATION_ID"
    privateKey: "GITHUB_APP_PRIVATE_KEY"
  # Inline credential values, used ONLY when existingSecret is empty (the chart
  # then creates the Secret). Keep empty in committed values — never commit a real
  # App private key. privateKey accepts raw PEM or base64-encoded PEM (the API
  # decodes base64 transparently).
  appId: ""
  installationID: ""
  privateKey: ""

ingress:
  enabled: true
  className: "nginx"
  host: "fdh.askenaz.dev"
  tls:
    enabled: true
    # Secret holding the TLS cert + key. With Cloudflare Origin Certificate
    # (recommended), create once and reuse across subdomains:
    #   kubectl create secret tls cloudflare-origin-tls \
    #     --cert=origin.pem --key=origin.key --namespace fdh
    secretName: "cloudflare-origin-tls"
  annotations:
    # NextAuth (Auth.js) stores the OIDC id_token + access_token inside the JWT
    # session cookie, so the /api/auth/callback response sets several multi-KB
    # `Set-Cookie` headers. nginx-ingress's default proxy_buffer_size (4k) can't
    # buffer them and 502s the callback with "upstream sent too big header while
    # reading response header from upstream" — the request never reaches the app
    # (so the web pod logs nothing). Bigger buffers let the session cookie
    # through and the OIDC callback completes.
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    # If using cert-manager + ClusterIssuer instead of an Origin Cert:
    # cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"

service:
  type: ClusterIP
