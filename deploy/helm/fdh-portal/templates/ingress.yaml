{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "fdh-portal.fullname" . }}
  labels:
    {{- include "fdh-portal.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Wire protocol consumed by the fdh CLI's HTTPRegistry. Anonymous,
          # cacheable, never goes through Next.js. Must come before /api so
          # the prefix match doesn't fall through to the web service.
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "fdh-portal.api.name" . }}
                port:
                  name: http
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "fdh-portal.api.name" . }}
                port:
                  name: http
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: {{ include "fdh-portal.api.name" . }}
                port:
                  name: http
          - path: /openapi.yaml
            pathType: Exact
            backend:
              service:
                name: {{ include "fdh-portal.api.name" . }}
                port:
                  name: http
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: {{ include "fdh-portal.api.name" . }}
                port:
                  name: http
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: {{ include "fdh-portal.api.name" . }}
                port:
                  name: http
          - path: /readyz
            pathType: Exact
            backend:
              service:
                name: {{ include "fdh-portal.api.name" . }}
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "fdh-portal.web.name" . }}
                port:
                  name: http
{{- end }}
