{{- if .Values.ingress.enabled }}
{{- $svcAPI := include "fdh-portal.api.name" . -}}
{{- $svcWeb := include "fdh-portal.web.name" . -}}
{{- /*
  Hosts served by the portal. `host` is canonical (fdh.askenaz.dev). Any
  `aliasHosts` (e.g. the deprecated agent-skills.askenaz.dev) are served
  IDENTICALLY from the same backends so existing links keep working during
  the migration window. A true 301 redirect from alias → canonical is done
  at the Cloudflare edge (the ingress-nginx `permanent-redirect` annotation
  rejects `$request_uri`, and snippet annotations are disabled cluster-wide).
*/ -}}
{{- $hosts := prepend (.Values.ingress.aliasHosts | default (list)) .Values.ingress.host -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "fdh-portal.fullname" . }}
  labels:
    {{- include "fdh-portal.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        {{- range $hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    {{- range $host := $hosts }}
    - host: {{ $host | quote }}
      http:
        paths:
          # Wire protocol consumed by the fdh CLI's HTTPRegistry. Anonymous,
          # cacheable, never goes through Next.js. Must come before /api so
          # the prefix match doesn't fall through to the web service.
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ $svcAPI }}
                port:
                  name: http
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ $svcAPI }}
                port:
                  name: http
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: {{ $svcAPI }}
                port:
                  name: http
          - path: /openapi.yaml
            pathType: Exact
            backend:
              service:
                name: {{ $svcAPI }}
                port:
                  name: http
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: {{ $svcAPI }}
                port:
                  name: http
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: {{ $svcAPI }}
                port:
                  name: http
          - path: /readyz
            pathType: Exact
            backend:
              service:
                name: {{ $svcAPI }}
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $svcWeb }}
                port:
                  name: http
    {{- end }}
{{- end }}
