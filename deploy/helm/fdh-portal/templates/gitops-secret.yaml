{{- if .Values.gitops.enabled }}
# GitHub App ("the bot") credential Secret (portal-gitops-write, Phase 3).
#
# Everything here is gated by .Values.gitops.enabled and is strictly ADDITIVE —
# with the flag off (the default) none of it renders, the API receives no
# GITHUB_APP_* env, and the gitops client constructs DISABLED
# (gitops.ErrGitopsNotConfigured); the write endpoints return a typed 503
# gitops_not_configured while catalog/admin reads are unaffected
# (portal-runtime-resilience).
#
# This Secret holds ONLY the App installation credential (id + installation id +
# private key) — the single credential that can write to the hub repo, and it can
# only OPEN PRs, never merge (decision D3). It is created ONLY when the operator
# has NOT supplied an existing Secret via gitops.existingSecret (the production
# path provisions the App key out-of-band; the inline literals are for
# non-production / dummy overrides). NEVER commit a real App private key here.
{{- if not .Values.gitops.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fdh-portal.gitops.name" . }}
  labels:
    {{- include "fdh-portal.labels" . | nindent 4 }}
    app.kubernetes.io/component: gitops
type: Opaque
stringData:
  {{ .Values.gitops.secretKeys.appId }}: {{ .Values.gitops.appId | quote }}
  {{ .Values.gitops.secretKeys.installationID }}: {{ .Values.gitops.installationID | quote }}
  {{ .Values.gitops.secretKeys.privateKey }}: {{ .Values.gitops.privateKey | quote }}
{{- end }}
{{- end }}
