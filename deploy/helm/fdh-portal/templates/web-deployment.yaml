apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fdh-portal.web.name" . }}
  labels:
    {{- include "fdh-portal.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "fdh-portal.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "fdh-portal.labels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      {{- with .Values.web.hostAliases }}
      # Pin the IdP host in /etc/hosts so the OIDC backchannel never depends on
      # the cluster's flaky DNS forward to public resolvers (which intermittently
      # fails to resolve the IdP host and surfaces as NextAuth
      # `error=Configuration` / "fetch failed" on the callback).
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "fdh-portal.web.image" . | quote }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: FDH_API_BASE_URL
              value: "http://{{ include "fdh-portal.api.name" . }}:8080"
            - name: NEXT_PUBLIC_SITE_URL
              value: "https://{{ .Values.ingress.host }}"
            # Public origin Auth.js (NextAuth) uses for sign-in/callback/error
            # URLs. Behind Cloudflare+ingress, host auto-detection lands on the
            # pod's internal 0.0.0.0:3000 (breaking the callback redirect_uri and
            # the error redirect), so pin it explicitly.
            - name: AUTH_URL
              value: "https://{{ .Values.ingress.host }}"
            - name: AUTH_TRUST_HOST
              value: "true"
            - name: AUTH_KEYCLOAK_ID
              value: {{ .Values.oidc.clientID | quote }}
            - name: AUTH_KEYCLOAK_ISSUER
              value: {{ .Values.oidc.discoveryURL | quote }}
            - name: AUTH_KEYCLOAK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oidc.clientSecretRef.name }}
                  key: {{ .Values.oidc.clientSecretRef.key }}
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oidc.clientSecretRef.name }}
                  key: auth_secret
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
