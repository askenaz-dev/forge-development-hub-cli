apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "fdh-portal.api.name" . }}
  labels:
    {{- include "fdh-portal.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  # StatefulSet (not Deployment) so each replica gets its OWN persistent hub
  # clone via volumeClaimTemplates. The cluster has only RWO, node-local
  # storage (local-path; no RWX), so a single shared volume is impossible.
  # The persisted clone lets a pod come up Ready on restart WITHOUT re-cloning
  # from the remote at boot — the refresh loop keeps it fresh afterwards.
  serviceName: {{ include "fdh-portal.api.name" . }}-headless
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "fdh-portal.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "fdh-portal.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        # Roll the pods when the role-map ConfigMap changes.
        checksum/role-map: {{ .Values.oidc.roleMapConfigMap | sha256sum }}
    spec:
      containers:
        - name: api
          image: {{ include "fdh-portal.api.image" . | quote }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: FDH_PORTAL_API_ADDR
              value: ":8080"
            - name: FDH_PORTAL_REGISTRY_URL
              value: {{ .Values.portal.registryURL | quote }}
            - name: FDH_PORTAL_REGISTRY_BRANCH
              value: {{ .Values.portal.registryBranch | quote }}
            - name: FDH_PORTAL_REFRESH_INTERVAL
              value: {{ .Values.portal.refreshInterval | quote }}
            - name: FDH_PORTAL_REGISTRY_LOCAL_PATH
              value: /var/fdh/registry
            # Persisted per-pod clone (volumeClaimTemplates below). Both the
            # wire handlers (/v1/*) and the in-memory snapshot read the catalog
            # from this path; on restart the PVC already holds the working
            # tree, so /readyz flips without a boot-time network clone.
            - name: FDH_PORTAL_HUB_PATH
              value: /var/fdh/registry
            - name: OIDC_DISCOVERY_URL
              value: {{ .Values.oidc.discoveryURL | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.oidc.clientID | quote }}
            - name: OIDC_ROLE_MAP_PATH
              value: /config/role-map.yaml
            - name: FDH_PORTAL_IDP_PROFILE
              value: {{ .Values.oidc.profile | default "local" | quote }}
            {{- if .Values.observability.otel.endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otel.endpoint | quote }}
            {{- end }}
            {{- if .Values.telemetry.store.enabled }}
            # Usage-telemetry store DSN (hub-usage-telemetry Phase 2). Sourced
            # from the chart-managed (or operator-supplied) telemetry Secret.
            # ADDITIVE + GUARDED: present only when telemetry.store.enabled. The
            # API treats this as STRICTLY OPTIONAL — if the var is absent or the
            # store is unreachable, boot still succeeds and anonymous catalog
            # reads are unaffected (portal-runtime-resilience); ingest degrades
            # to a best-effort drop.
            - name: FDH_TELEMETRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fdh-portal.telemetry.secretName" . }}
                  key: FDH_TELEMETRY_DSN
            {{- end }}
            {{- if .Values.gitops.enabled }}
            # Web → Git CONFIG write surface (portal-gitops-write Phase 3). The
            # GitHub App ("the bot") credential. ADDITIVE + GUARDED: present only
            # when gitops.enabled. SHIPS DARK / NON-FATAL — with the flag off none
            # of this is set, the gitops client is DISABLED, the API still boots
            # and serves reads, and write endpoints return 503 gitops_not_configured
            # (portal-runtime-resilience). The id + installation id + private key
            # come from the gitops Secret (existing or chart-managed); owner/repo/
            # apiBaseURL are non-secret. Env var names match the Go API's
            # ConfigFromEnv (internal/portalapi/gitops/github_client.go).
            - name: GITHUB_HUB_OWNER
              value: {{ .Values.gitops.hub.owner | quote }}
            - name: GITHUB_HUB_REPO
              value: {{ .Values.gitops.hub.repo | quote }}
            {{- if .Values.gitops.apiBaseURL }}
            - name: GITHUB_API_BASE_URL
              value: {{ .Values.gitops.apiBaseURL | quote }}
            {{- end }}
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "fdh-portal.gitops.secretName" . }}
                  key: {{ .Values.gitops.secretKeys.appId }}
            - name: GITHUB_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "fdh-portal.gitops.secretName" . }}
                  key: {{ .Values.gitops.secretKeys.installationID }}
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fdh-portal.gitops.secretName" . }}
                  key: {{ .Values.gitops.secretKeys.privateKey }}
            {{- end }}
          volumeMounts:
            - name: role-map
              mountPath: /config
            - name: registry-data
              mountPath: /var/fdh/registry
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: role-map
          configMap:
            name: {{ .Values.oidc.roleMapConfigMap }}
  volumeClaimTemplates:
    - metadata:
        name: registry-data
        labels:
          # STABLE subset only (name + instance), plus component. volumeClaimTemplates
          # is an IMMUTABLE StatefulSet field, so the chart/version-dependent labels
          # in fdh-portal.labels (helm.sh/chart, app.kubernetes.io/version,
          # managed-by) must NOT be stamped here — otherwise a chart-version bump
          # makes `helm upgrade` reject the VCT change ("updates to statefulset spec
          # for fields other than 'template' … are forbidden"). Mirrors the selector
          # above; see the rationale on fdh-portal.selectorLabels.
          {{- include "fdh-portal.selectorLabels" . | nindent 10 }}
          app.kubernetes.io/component: api
      spec:
        accessModes: ["ReadWriteOnce"]
        # Defensive defaults so the template renders even when api.persistence
        # is absent from the merged values (e.g. `helm upgrade --reuse-values`
        # on a release created before this key existed).
        {{- with (.Values.api.persistence | default dict).storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ (.Values.api.persistence | default dict).size | default "1Gi" | quote }}
