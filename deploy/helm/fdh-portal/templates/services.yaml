# Headless Service governing the API StatefulSet (stable per-pod DNS).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fdh-portal.api.name" . }}-headless
  labels:
    {{- include "fdh-portal.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  clusterIP: None
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    {{- include "fdh-portal.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
# ClusterIP Service the Ingress routes to.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fdh-portal.api.name" . }}
  labels:
    {{- include "fdh-portal.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    {{- include "fdh-portal.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fdh-portal.web.name" . }}
  labels:
    {{- include "fdh-portal.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: 3000
      targetPort: http
  selector:
    {{- include "fdh-portal.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
