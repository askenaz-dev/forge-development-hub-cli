# goreleaser config for fdh.
#
# Goal: produce signed-once-ready binaries + Linux packages + a Homebrew
# formula + a winget manifest, all from a single tag push, with a stable
# artifact-naming convention the install scripts depend on.
#
# Artifact naming convention (matched by scripts/install.sh and install.ps1):
#   fdh_<version>_<os>_<arch>.tar.gz   (Linux, macOS)
#   fdh_<version>_<os>_<arch>.zip      (Windows)
#   each artifact is accompanied by a sibling `.sha256` file generated by
#   the `checksum:` block below.
#
# Distribution targets:
#   - Internal Artifactory/Nexus/etc (via the release.yml workflow's
#     `publish-package-manager` job, using the host configured by
#     `vars.PKG_BASE_URL`).
#   - Homebrew tap (placeholder; update repo name when task 1.4 lands).
#   - winget source (placeholder; update identifier when task 1.4 lands).
#   - Linux .deb / .rpm via nfpm.
#
# What's NOT here:
#   - Authenticode signing (Windows) and Apple Developer ID notarization
#     (macOS) — pending platform confirmation (task 1.5). When the certs
#     are available, add `signs:` and `notarize:` stanzas referencing
#     them via secrets in CI.

version: 2

project_name: fdh

before:
  hooks:
    - go mod tidy

builds:
  - id: fdh
    main: ./cmd/fdh
    binary: fdh
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Windows arm64 is out of scope for the initial release.
    ignore:
      - goos: windows
        goarch: arm64

  - id: forge-installer-stub
    main: ./cmd/forge-installer-stub
    binary: forge-installer
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: fdh
    ids:
      - fdh
    name_template: "fdh_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

  - id: forge-installer-stub
    ids:
      - forge-installer-stub
    name_template: "forge-installer_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE

checksum:
  # One `.sha256` file PER artifact so the install scripts can fetch
  # `<artifact>.sha256` directly without parsing a combined index.
  name_template: "{{ .ArtifactName }}.sha256"
  algorithm: sha256
  split: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

# nfpm produces .deb and .rpm packages with a post-install script that
# symlinks the binary into /usr/local/bin/fdh so it lands on PATH for
# every shell on the host.
nfpms:
  - id: fdh
    package_name: fdh
    file_name_template: "fdh_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - fdh
    homepage: https://fdh.forge.internal
    maintainer: forge Developer Productivity <dx@forge.internal>
    description: |
      fdh — forge Development Hub CLI.
      Installs Agent Skills across Claude Code, Copilot, Codex, and OpenCode
      from the central skill registry.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/lib/fdh
    contents:
      - src: /usr/lib/fdh/fdh
        dst: /usr/local/bin/fdh
        type: symlink

# Homebrew tap — placeholder. Update `repository.name` and possibly
# `repository.owner` when the internal tap is confirmed (task 1.4).
brews:
  - name: fdh
    ids:
      - fdh
    repository:
      owner: forge-internal
      name: homebrew-tools
      # The token is wired in CI as HOMEBREW_TAP_TOKEN; goreleaser reads
      # it from env when present.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://fdh.forge.internal
    description: "forge Development Hub CLI"
    license: MIT
    # The download URL substitution uses the same artifact-naming convention
    # as the install scripts. `download_strategy` keeps it on the internal
    # host, not GitHub Releases.
    skip_upload: auto # produces the formula but does NOT push when running locally; CI overrides.
    install: |
      bin.install "fdh"
    test: |
      system "#{bin}/fdh", "--version"

# winget manifest — placeholder. Update `name` and `publisher` when the
# internal source is confirmed (task 1.4).
winget:
  - name: fdh
    publisher: forge
    short_description: "forge Development Hub CLI"
    license: MIT
    homepage: https://fdh.forge.internal
    ids:
      - fdh
    repository:
      owner: forge-internal
      name: winget-pkgs
      token: "{{ .Env.WINGET_TAP_TOKEN }}"
    publisher_url: https://fdh.forge.internal
    publisher_support_url: https://fdh.forge.internal/support
    package_identifier: forge.FDH
    skip_upload: auto

release:
  # The platform's internal package manager (Artifactory/Nexus/etc) is
  # where binaries actually land; GH Releases (when this repo is on
  # GitHub Enterprise) gets the changelog + the artifacts as a backup.
  github:
    owner: forge
    name: fdh
  draft: false
  prerelease: auto
