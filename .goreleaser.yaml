# goreleaser config for fdh.
#
# Goal: produce cross-compiled binaries + Linux packages, publish them as
# assets on GitHub Releases, with a stable artifact-naming convention the
# install scripts depend on.
#
# Artifact naming convention (matched by scripts/install.sh and install.ps1):
#   fdh_<version>_<os>_<arch>.tar.gz   (Linux, macOS)
#   fdh_<version>_<os>_<arch>.zip      (Windows)
#   each artifact is accompanied by a sibling `.sha256` file generated by
#   the `checksum:` block below.
#
# Distribution targets:
#   - GitHub Releases (default, published by `goreleaser release --clean`).
#     install.sh / install.ps1 / the npm postinstall all read from there.
#   - Linux .deb / .rpm via nfpm, uploaded as release assets.
#
# What's NOT here (intentionally — add back when ready to maintain them):
#   - Homebrew tap.
#   - winget manifest.
#   - Authenticode signing (Windows) and Apple Developer ID notarization
#     (macOS) — add `signs:` and `notarize:` when the certs are available.

version: 2

project_name: fdh

before:
  hooks:
    - go mod tidy

builds:
  - id: fdh
    main: ./cmd/fdh
    binary: fdh
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Windows arm64 is out of scope for the initial release.
    ignore:
      - goos: windows
        goarch: arm64

  - id: forge-installer-stub
    main: ./cmd/forge-installer-stub
    binary: forge-installer
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: fdh
    ids:
      - fdh
    name_template: "fdh_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

  - id: forge-installer-stub
    ids:
      - forge-installer-stub
    name_template: "forge-installer_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE

checksum:
  # One `.sha256` file PER artifact so the install scripts can fetch
  # `<artifact>.sha256` directly without parsing a combined index.
  name_template: "{{ .ArtifactName }}.sha256"
  algorithm: sha256
  split: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

# nfpm produces .deb and .rpm packages with a post-install script that
# symlinks the binary into /usr/local/bin/fdh so it lands on PATH for
# every shell on the host.
nfpms:
  - id: fdh
    package_name: fdh
    file_name_template: "fdh_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - fdh
    homepage: https://github.com/askenaz-dev/forge-development-hub-cli
    maintainer: askenaz <hi@askenaz.dev>
    description: |
      fdh — Forge Development Hub CLI.
      Installs Agent Skills across Claude Code, Copilot, Codex, and OpenCode
      from the central skill registry.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/lib/fdh
    contents:
      - src: /usr/lib/fdh/fdh
        dst: /usr/local/bin/fdh
        type: symlink

release:
  # Publish to GitHub Releases on askenaz-dev/forge-development-hub-cli.
  # install.sh, install.ps1 and the npm postinstall all resolve assets
  # from there by default.
  github:
    owner: askenaz-dev
    name: forge-development-hub-cli
  draft: false
  prerelease: auto
